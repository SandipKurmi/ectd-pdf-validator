version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    # reload flag is already in the entrypoint if we used the one from main.py,
    # but here we override command to ensure reload works with volume mount
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
